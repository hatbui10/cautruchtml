<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Structure Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 24px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel h3 {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input, textarea {
            font-family: 'Fira Code', monospace;
            background: #0f172a;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        .btn {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-success {
            background-color: var(--success);
        }

        .btn-success:hover {
            background-color: var(--success-hover);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        .output-box {
            position: relative;
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            color: #38bdf8;
            max-height: 180px;
            overflow-y: auto;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .action-bar {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>⚡ Project Structure Builder</h2>
    </header>

    <div class="grid-layout">
        <!-- Cột nhập liệu -->
        <div class="panel">
            <h3>Cấu hình Dự án</h3>
            
            <div class="input-group">
                <label for="title">Tên Project</label>
                <input id="title" value="My Project">
            </div>

            <div class="input-group">
                <label for="css">Danh sách file CSS (mỗi dòng 1 tên)</label>
                <textarea id="css">style
login
student</textarea>
            </div>

            <div class="input-group">
                <label for="js">Danh sách file JS (mỗi dòng 1 tên)</label>
                <textarea id="js">firebase
login
student
main</textarea>
            </div>

            <div class="input-group">
                <label for="html">Danh sách trang HTML / Menu</label>
                <textarea id="html">project-builder
student-manager</textarea>
            </div>

            <button class="btn btn-success" onclick="build()">🚀 Tạo Code Ngay</button>
        </div>

        <!-- Cột kết quả -->
        <div class="panel">
            <h3>Kết quả xử lý</h3>

            <div>
                <div class="output-header">
                    <label>CSS Links</label>
                    <button class="btn btn-sm" onclick="copyBox('cssOut')">📋 Copy</button>
                </div>
                <div id="cssOut" class="output-box"></div>
            </div>

            <div>
                <div class="output-header">
                    <label>JS Scripts</label>
                    <button class="btn btn-sm" onclick="copyBox('jsOut')">📋 Copy</button>
                </div>
                <div id="jsOut" class="output-box"></div>
            </div>

            <div>
                <div class="output-header">
                    <label>HTML Menu Links</label>
                    <button class="btn btn-sm" onclick="copyBox('htmlOut')">📋 Copy</button>
                </div>
                <div id="htmlOut" class="output-box"></div>
            </div>
        </div>

        <!-- Kết quả Index.html riêng biệt full chiều ngang -->
        <div class="panel full-width">
            <div class="output-header">
                <h3>Template index.html hoàn chỉnh</h3>
                <button class="btn btn-sm" onclick="copyBox('indexOut')">📋 Copy Index Code</button>
            </div>
            <div id="indexOut" class="output-box" style="max-height: 250px;"></div>
        </div>
    </div>
</div>

<script>
function lines(id){
    return document.getElementById(id).value.split(/\n/).map(x=>x.trim()).filter(Boolean);
}

function build(){
    const css = lines('css'), js = lines('js'), ht = lines('html');
    const cssLinks = css.map(x=>'<link rel="stylesheet" href="css/'+x+'.css">').join('\n');
    const jsLinks = js.map(x=>'<script src="js/'+x+'.js"><\\/script>').join('\n');
    const menu = ht.map(x=>'<a href="'+x+'/">'+x+'</a>').join('\n');
    
    document.getElementById('cssOut').textContent = cssLinks;
    document.getElementById('jsOut').textContent = jsLinks;
    document.getElementById('htmlOut').textContent = menu;
    
    document.getElementById('indexOut').textContent = 
        '<!DOCTYPE html>\n<html lang="vi">\n<head>\n<meta charset="UTF-8">\n<title>' + document.getElementById('title').value + '</title>\n\n' + cssLinks + '\n</head>\n<body>\n<h1>' + document.getElementById('title').value + '</h1>\n' + menu + '\n\n' + jsLinks + '\n</body>\n</html>';
}

// Tự động chạy lần đầu
build();

function copyBox(id){
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text).then(() => {
        alert('✨ Đã copy vào clipboard!');
    });
}
</script>

</body>
</html>
