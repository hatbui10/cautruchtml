<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Structure Builder</title>
    <!-- Import Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Liên kết tới file CSS trong thư mục css/ -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <header>
        <h2>⚡ Project Structure Builder</h2>
    </header>

    <div class="grid-layout">
        <!-- Cột nhập liệu -->
        ... (giữ nguyên phần trên) ...
        
        <!-- Kết quả Index.html riêng biệt full chiều ngang -->
        <div class="panel full-width">
            <div class="output-header">
                <h3>Template index.html hoàn chỉnh</h3>
                <button class="btn btn-sm" onclick="copyBox('indexOut')">📋 Copy Index Code</button>
            </div>
            <div id="indexOut" class="output-box" style="max-height: 250px;"></div>
        </div>
    </div>

    <!-- ĐẶT KHỐI NÀY VÀO TRONG CONTAINER ĐỂ ĐỒNG BỘ GIAO DIỆN -->
    <div class="card-export-import" style="margin-top: 30px;">
        <h3 style="text-align: center; color: var(--accent-color, #00f0ff); margin-bottom: 20px;">
            Hàm A sẽ lấy dữ liệu từ hàm B
        </h3>
        
        <div class="input-group" style="margin-bottom: 12px;">
            <label for="targetFileName">Tên file nguồn / đích (để tạo đường dẫn import):</label>
            <input type="text" id="targetFileName" value="./uiRenderer.js" placeholder="Ví dụ: ./storage.js hoặc ./uiRenderer.js" oninput="generateExportImportCode()">
        </div>

        <div class="input-group" style="margin-bottom: 12px;">
            <label for="funcNameInput">Nhập danh sách tên hàm (mỗi dòng 1 tên):</label>
            <textarea id="funcNameInput" placeholder="openLoginModal&#10;closeLoginModal" oninput="generateExportImportCode()"></textarea>
        </div>
        
        <div class="control-buttons" style="margin-bottom: 10px;">
            <button class="btn btn-success" onclick="generateExportImportCode()">⚡ Sinh Code Export/Import</button>
            <button class="btn" onclick="parseNamesFromCode()">📥 Quét tên hàm từ Code</button>
        </div>

        <div class="export-import-grid">
            <div class="column-box">
                <label>1. Code Export (Đặt vào file nguồn):</label>
                <textarea id="exportOut" placeholder="Code export sẽ hiện ở đây..."></textarea>
                <button class="btn btn-sm" onclick="copyText('exportOut')">📋 Copy Export</button>
            </div>

            <div class="column-box">
                <label>2. Code Import (Dán sang file cần dùng):</label>
                <textarea id="importOut" placeholder="Code import sẽ hiện ở đây..."></textarea>
                <button class="btn btn-sm" onclick="copyText('importOut')">📋 Copy Import</button>
            </div>
        </div>
    </div>
</div>
    
<!-- Liên kết tới file JS trong thư mục js/ -->
    <script src="js/export-import.js"></script>
<script src="js/main.js"></script>

</body>
</html>
